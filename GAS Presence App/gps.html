<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard GPS Modul 3</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; margin: 0; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2563eb; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; background: #e2e8f0; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; }
        .tab-btn.active { background: #2563eb; color: white; }
        .hidden { display: none; }
        input, button { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        input[readonly] { background-color: #e2e8f0; color: #64748b; cursor: not-allowed; }
        .btn-primary { background: #2563eb; color: white; cursor: pointer; font-weight: bold; }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
        .btn-danger { background: #dc2626; color: white; cursor: pointer; font-weight: bold; display: none; }
        
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; margin-bottom: 15px; }
        .val { font-size: 1.2rem; font-weight: bold; color: #2563eb; }
        .log-box { background: #eee; padding: 10px; height: 100px; overflow-y: auto; font-size: 0.8rem; border-radius: 6px; font-family: monospace; }
        
        /* Peta Leaflet */
        #map { height: 400px; width: 100%; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tracker GPS & Peta</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('sender')">📡 HP Mahasiswa (Kirim GPS)</button>
        <button class="tab-btn" onclick="switchTab('admin')">🗺️ Mode Admin (Peta)</button>
    </div>

    <div id="panel-sender">
        <label>Device ID:</label>
        <input type="text" id="device-id" placeholder="Mendeteksi Device ID..." readonly>
        
        <div class="grid-3">
            <div>Latitude<div id="val-lat" class="val">-</div></div>
            <div>Longitude<div id="val-lng" class="val">-</div></div>
            <div>Akurasi<div id="val-acc" class="val">-</div></div>
        </div>

        <button id="btn-start" class="btn-primary" onclick="toggleGps()" disabled>Menyiapkan Device...</button>
        <button id="btn-stop" class="btn-danger" onclick="toggleGps()">Hentikan Lacak</button>
        <div id="log-sender" class="log-box">Menunggu aksi...</div>
    </div>

    <div id="panel-admin" class="hidden">
        <div style="display: flex; gap:10px;">
            <input type="text" id="monitor-id" placeholder="Masukkan Device ID Mahasiswa">
            <button id="btn-monitor" class="btn-primary" style="width: 150px;" onclick="toggleMonitor()">Pantau</button>
        </div>
        
        <div id="map"></div>
        <div id="log-admin" class="log-box" style="height: 60px;">Buka peta untuk memantau...</div>
    </div>
</div>

<script>
    // ==========================================
    // GANTI DENGAN URL WEB APP ANDA (/exec)
    const API_URL = "https://script.google.com/macros/s/AKfycbwRWRN2Nn3vvDzWNO8IYinc449oZcnyCCC3NJmzqTX0gSnOyFpEzo4Giap3nYEwg39M4g/exec";
    // ==========================================

    function logS(msg) { document.getElementById('log-sender').innerHTML = `<div>> ${msg}</div>` + document.getElementById('log-sender').innerHTML; }
    function logA(msg) { document.getElementById('log-admin').innerHTML = `<div>> ${msg}</div>` + document.getElementById('log-admin').innerHTML; }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-sender').classList.add('hidden');
        document.getElementById('panel-admin').classList.add('hidden');

        if(tab === 'sender') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('panel-sender').classList.remove('hidden');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('panel-admin').classList.remove('hidden');
            if(!map) initMap(); // Peta dirender saat tab dibuka
        }
    }

    // ================= FINGERPRINT LOGIC =================
    const fpPromise = import('https://openfpcdn.io/fingerprintjs/v4')
        .then(FingerprintJS => FingerprintJS.load());

    fpPromise
        .then(fp => fp.get())
        .then(result => {
            document.getElementById('device-id').value = result.visitorId;
            const btnStart = document.getElementById('btn-start');
            btnStart.disabled = false;
            btnStart.innerText = "Mulai Lacak GPS";
            logS("Device ID berhasil dideteksi.");
        })
        .catch(err => {
            logS("Gagal mendeteksi device fingerprint.");
            document.getElementById('device-id').placeholder = "Gagal mendeteksi";
        });

    // ================= SENDER LOGIC (Fake GPS Ready) =================
    let watchId = null;
    let isTracking = false;
    let lastSent = 0;

    function handlePosition(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        const acc = position.coords.accuracy;

        document.getElementById('val-lat').innerText = lat.toFixed(5);
        document.getElementById('val-lng').innerText = lng.toFixed(5);
        document.getElementById('val-acc').innerText = acc.toFixed(1) + "m";

        // Kirim data maksimal tiap 3 detik agar tidak spam server
        if (Date.now() - lastSent > 3000) {
            sendGpsToServer(lat, lng, acc);
            lastSent = Date.now();
        }
    }

    function handleError(error) {
        logS(`Error GPS: ${error.message}`);
    }

    async function sendGpsToServer(lat, lng, acc) {
        const deviceId = document.getElementById('device-id').value;
        const payload = {
            device_id: deviceId,
            ts: new Date().toISOString(),
            lat: lat,
            lng: lng,
            accuracy_m: acc
        };

        try {
            const res = await fetch(`${API_URL}?path=telemetry/gps`, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.ok) logS(`Terkirim: ${lat.toFixed(4)}, ${lng.toFixed(4)}`);
        } catch (e) {
            logS("Gagal kirim ke server.");
        }
    }

    function toggleGps() {
        if (!isTracking) {
            if (!navigator.geolocation) return alert("Browser tidak support GPS!");
            
            // Opsi enableHighAccuracy ini yang membuat Fake GPS langsung terbaca!
            watchId = navigator.geolocation.watchPosition(handlePosition, handleError, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 5000
            });
            
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'block';
            isTracking = true;
            logS("Membaca GPS...");
        } else {
            navigator.geolocation.clearWatch(watchId);
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('btn-stop').style.display = 'none';
            isTracking = false;
            logS("Pelacakan dihentikan.");
        }
    }

    // ================= ADMIN LOGIC (MAP VIEWER) =================
    let map, marker, polyline;
    let monitorInterval;
    let isMonitoring = false;

    function initMap() {
        // Koordinat default (Surabaya)
        map = L.map('map').setView([-7.2575, 112.7521], 13);
        
        // Load basemap jalanan dari OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Render ulang agar map tidak abu-abu saat dipindah tab
        setTimeout(() => { map.invalidateSize(); }, 300);
    }

    async function fetchMapData() {
        const deviceId = document.getElementById('monitor-id').value;
        if(!deviceId) return;

        try {
            // 1. Ambil History untuk Polyline
            const resHist = await fetch(`${API_URL}?path=telemetry/gps/history&device_id=${deviceId}&limit=50`);
            const histData = await resHist.json();

            if (histData.ok && histData.data.items.length > 0) {
                const latlngs = histData.data.items.map(p => [p.lat, p.lng]);
                
                if (polyline) map.removeLayer(polyline);
                polyline = L.polyline(latlngs, {color: 'blue', weight: 4}).addTo(map);
            }

            // 2. Ambil Latest untuk Marker
            const resLatest = await fetch(`${API_URL}?path=telemetry/gps/latest&device_id=${deviceId}`);
            const latestData = await resLatest.json();

            if (latestData.ok) {
                const pos = [latestData.data.lat, latestData.data.lng];
                
                if (marker) {
                    marker.setLatLng(pos);
                } else {
                    marker = L.marker(pos).addTo(map).bindPopup("Posisi Terakhir");
                }
                
                // Geser kamera peta pelan-pelan mengikuti marker
                map.setView(pos, map.getZoom());
                logA(`Update Peta: ${pos[0].toFixed(4)}, ${pos[1].toFixed(4)}`);
            }
        } catch (e) {
            logA("Error ambil data peta.");
        }
    }

    function toggleMonitor() {
        const btn = document.getElementById('btn-monitor');
        if(!isMonitoring) {
            isMonitoring = true;
            btn.style.background = "#dc2626";
            btn.innerText = "Stop Pantau";
            fetchMapData();
            monitorInterval = setInterval(fetchMapData, 3000); // Update peta tiap 3 dtk
        } else {
            isMonitoring = false;
            btn.style.background = "#2563eb";
            btn.innerText = "Pantau";
            clearInterval(monitorInterval);
        }
    }
</script>
</body>
</html>
