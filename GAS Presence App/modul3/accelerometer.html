<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetri Sensor HP & Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --danger: #dc2626;
            --warning: #f59e0b;
            --success: #16a34a;
            --bg: #f8fafc;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            padding: 20px;
            color: #333;
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        input,
        button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input[readonly] { 
            background-color: #e2e8f0; 
            color: #64748b; 
            cursor: not-allowed; 
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-primary:disabled { 
            background: #94a3b8; 
            cursor: not-allowed; 
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-success {
            background: var(--success);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        /* Style Tab Navigasi */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: #e2e8f0;
            color: #64748b;
            font-weight: bold;
            border: none;
            cursor: pointer;
            padding: 12px;
            flex: 1;
            border-radius: 8px;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .hidden {
            display: none;
        }

        .data-display {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .data-val {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .label {
            font-size: 0.8rem;
            color: #666;
        }

        .log-box {
            background: #eee;
            padding: 10px;
            height: 120px;
            overflow-y: auto;
            font-size: 0.8rem;
            border-radius: 6px;
            font-family: monospace;
        }

        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2 style="text-align: center;">Dashboard Telemetri</h2>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('sender')">📱 Mode Mahasiswa</button>
            <button class="tab-btn" onclick="switchTab('admin')">📊 Mode Admin</button>
        </div>

        <div id="panel-sender" class="card">
            <h3>1. Konfigurasi Device</h3>
            <input type="text" id="device-id" placeholder="Mendeteksi Device ID..." readonly>

            <button onclick="requestSensorPermission()" class="btn-warning">
                Klik Ini Dulu (Wajib untuk iPhone/iOS)
            </button>

            <h3>2. Data Sensor Real-time</h3>
            <div class="data-display">
                <div>
                    <div class="label">Accel X</div>
                    <div id="val-x" class="data-val">0.00</div>
                </div>
                <div>
                    <div class="label">Accel Y</div>
                    <div id="val-y" class="data-val">0.00</div>
                </div>
                <div>
                    <div class="label">Accel Z</div>
                    <div id="val-z" class="data-val">0.00</div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="senderChart"></canvas>
            </div>

            <button id="btn-start" class="btn-primary" onclick="toggleSending()" disabled>
                Menyiapkan Device...
            </button>

            <button id="btn-stop" class="btn-danger" onclick="toggleSending()">
                Hentikan Pengiriman
            </button>

            <div id="log-sender" class="log-box">Log pengiriman...</div>
        </div>

        <div id="panel-admin" class="card hidden">
            <h3>Pantau Device</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="monitor-device-id" placeholder="ID Device yang dipantau" value="">
                <button id="btn-monitor" class="btn-success" style="width: 120px; margin-bottom: 10px;"
                    onclick="toggleMonitoring()">Pantau</button>
            </div>

            <div class="chart-container">
                <canvas id="adminChart"></canvas>
            </div>

            <div id="log-admin" class="log-box" style="height: 80px;">Menunggu data...</div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwRWRN2Nn3vvDzWNO8IYinc449oZcnyCCC3NJmzqTX0gSnOyFpEzo4Giap3nYEwg39M4g/exec";

        // ================= LOGIC TAB =================
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('panel-sender').classList.add('hidden');
            document.getElementById('panel-admin').classList.add('hidden');

            if (tabName === 'sender') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('panel-sender').classList.remove('hidden');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('panel-admin').classList.remove('hidden');
                if (!adminChartInstance) initAdminChart();
            }
        }

        // ================= FINGERPRINT LOGIC =================
        const fpPromise = import('https://openfpcdn.io/fingerprintjs/v4')
            .then(FingerprintJS => FingerprintJS.load());

        fpPromise
            .then(fp => fp.get())
            .then(result => {
                document.getElementById('device-id').value = result.visitorId;
                const btnStart = document.getElementById('btn-start');
                btnStart.disabled = false;
                btnStart.innerText = "Mulai Kirim Data ke Cloud";
                logSender("Device ID berhasil dideteksi.");
            })
            .catch(err => {
                logSender("Gagal mendeteksi device fingerprint.");
                document.getElementById('device-id').placeholder = "Gagal mendeteksi";
            });

        // ================= LOGIC PENGIRIM (SENDER) =================
        let currentMotion = { x: 0, y: 0, z: 0 };
        let isSending = false;
        let isSensorActive = false;
        let sendInterval;
        let senderChartInstance = null;

        function logSender(msg) {
            const el = document.getElementById('log-sender');
            el.innerHTML = `<div>> ${msg}</div>` + el.innerHTML;
        }

        // Inisialisasi Grafik Pengirim
        function initSenderChart() {
            const ctx = document.getElementById('senderChart').getContext('2d');
            senderChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'X', borderColor: 'rgba(220, 38, 38, 1)', backgroundColor: 'transparent', data: [], tension: 0.3, pointRadius: 0, borderWidth: 2 },
                        { label: 'Y', borderColor: 'rgba(22, 163, 74, 1)', backgroundColor: 'transparent', data: [], tension: 0.3, pointRadius: 0, borderWidth: 2 },
                        { label: 'Z', borderColor: 'rgba(37, 99, 235, 1)', backgroundColor: 'transparent', data: [], tension: 0.3, pointRadius: 0, borderWidth: 2 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { display: false },
                        y: { suggestedMin: -15, suggestedMax: 15 }
                    },
                    animation: { duration: 0 },
                    plugins: { legend: { display: true, position: 'top' } }
                }
            });
        }
        
        // Panggil saat halaman dimuat
        initSenderChart();

        // Tangkap event devicemotion
        function handleMotion(event) {
            const acc = event.accelerationIncludingGravity;
            if (!acc) return;
            currentMotion.x = (acc.x ?? 0).toFixed(2);
            currentMotion.y = (acc.y ?? 0).toFixed(2);
            currentMotion.z = (acc.z ?? 0).toFixed(2);
            isSensorActive = true;
        }

        // Timer untuk update UI (Angka & Grafik Mahasiswa) agar tidak lag
        setInterval(() => {
            if (!isSensorActive) return;

            // Update Angka
            document.getElementById('val-x').textContent = currentMotion.x;
            document.getElementById('val-y').textContent = currentMotion.y;
            document.getElementById('val-z').textContent = currentMotion.z;

            // Update Grafik (Maksimal 30 titik agar tidak berat)
            if (senderChartInstance) {
                const timeLabel = new Date().toLocaleTimeString();
                if (senderChartInstance.data.labels.length > 30) {
                    senderChartInstance.data.labels.shift();
                    senderChartInstance.data.datasets[0].data.shift();
                    senderChartInstance.data.datasets[1].data.shift();
                    senderChartInstance.data.datasets[2].data.shift();
                }
                senderChartInstance.data.labels.push(timeLabel);
                senderChartInstance.data.datasets[0].data.push(currentMotion.x);
                senderChartInstance.data.datasets[1].data.push(currentMotion.y);
                senderChartInstance.data.datasets[2].data.push(currentMotion.z);
                senderChartInstance.update();
            }
        }, 200); // Update grafik 5x per detik

        function requestSensorPermission() {
            if (location.protocol !== "https:" && location.hostname !== "localhost") {
                logSender("iOS butuh HTTPS untuk sensor.");
                return;
            }

            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(response => {
                    if (response === 'granted') {
                        window.addEventListener('devicemotion', handleMotion);
                        logSender("Izin sensor diberikan.");
                    } else {
                        logSender("Izin sensor ditolak.");
                    }
                }).catch(err => logSender("Error izin: " + err));
            } else {
                window.addEventListener('devicemotion', handleMotion);
                logSender("Sensor aktif (Android / non-iOS).");
            }
        }

        // --- SEND DATA TO GOOGLE SHEET ---
        async function sendData() {
            const deviceId = document.getElementById('device-id').value;
            if (!deviceId) { logSender("Harap isi ID Device!"); return; }

            const payload = {
                device_id: deviceId,
                ts: new Date().toISOString(),
                samples: [{
                    t: new Date().toISOString(),
                    x: currentMotion.x,
                    y: currentMotion.y,
                    z: currentMotion.z
                }]
            };

            try {
                const response = await fetch(`${API_URL}?path=telemetry/accel`, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                });

                const text = await response.text();
                let result;
                try { result = JSON.parse(text); } catch { return logSender("Response bukan JSON."); }

                if (result.ok) {
                    logSender(`Terkirim: X=${currentMotion.x}, Y=${currentMotion.y}, Z=${currentMotion.z}`);
                } else {
                    logSender("Gagal: " + result.error);
                }
            } catch (e) {
                logSender("Error jaringan / CORS.");
            }
        }

        function toggleSending() {
            if (!isSending) {
                isSending = true;
                document.getElementById('btn-start').style.display = 'none';
                document.getElementById('btn-stop').style.display = 'block';
                sendInterval = setInterval(sendData, 3000); // Kirim setiap 3 detik
                logSender("Mulai mengirim data...");
            } else {
                isSending = false;
                clearInterval(sendInterval);
                document.getElementById('btn-start').style.display = 'block';
                document.getElementById('btn-stop').style.display = 'none';
                logSender("Pengiriman dihentikan.");
            }
        }

        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission !== 'function') {
            window.addEventListener('devicemotion', handleMotion);
        }

        // ================= LOGIC ADMIN (VIEWER & CHART) =================
        let isMonitoring = false;
        let monitorInterval;
        let adminChartInstance = null;

        function logAdmin(msg) {
            const el = document.getElementById('log-admin');
            el.innerHTML = `<div>> ${msg}</div>` + el.innerHTML;
        }

        function initAdminChart() {
            const ctx = document.getElementById('adminChart').getContext('2d');
            adminChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'Sumbu X', borderColor: 'rgba(220, 38, 38, 1)', backgroundColor: 'rgba(220, 38, 38, 0.1)', data: [], tension: 0.3 },
                        { label: 'Sumbu Y', borderColor: 'rgba(22, 163, 74, 1)', backgroundColor: 'rgba(22, 163, 74, 0.1)', data: [], tension: 0.3 },
                        { label: 'Sumbu Z', borderColor: 'rgba(37, 99, 235, 1)', backgroundColor: 'rgba(37, 99, 235, 0.1)', data: [], tension: 0.3 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { display: false },
                        y: { suggestedMin: -15, suggestedMax: 15 }
                    },
                    animation: { duration: 0 }
                }
            });
        }

        async function fetchLatestData() {
            const deviceId = document.getElementById('monitor-device-id').value;
            if (!deviceId) return;

            try {
                const response = await fetch(`${API_URL}?path=telemetry/accel/latest&device_id=${deviceId}`);
                const result = await response.json();

                if (result.ok) {
                    const data = result.data;
                    const timeLabel = new Date(data.t).toLocaleTimeString();

                    logAdmin(`Data baru: X=${data.x}, Y=${data.y}, Z=${data.z}`);

                    if (adminChartInstance.data.labels.length > 15) {
                        adminChartInstance.data.labels.shift();
                        adminChartInstance.data.datasets[0].data.shift();
                        adminChartInstance.data.datasets[1].data.shift();
                        adminChartInstance.data.datasets[2].data.shift();
                    }

                    adminChartInstance.data.labels.push(timeLabel);
                    adminChartInstance.data.datasets[0].data.push(data.x);
                    adminChartInstance.data.datasets[1].data.push(data.y);
                    adminChartInstance.data.datasets[2].data.push(data.z);
                    adminChartInstance.update();
                } else {
                    logAdmin("Gagal baca / device tidak ada.");
                }
            } catch (e) {
                logAdmin("Error mengambil data dari server.");
            }
        }

        function toggleMonitoring() {
            const btn = document.getElementById('btn-monitor');
            if (!isMonitoring) {
                isMonitoring = true;
                btn.style.background = "var(--danger)";
                btn.textContent = "Stop";

                fetchLatestData();
                monitorInterval = setInterval(fetchLatestData, 3000);
            } else {
                isMonitoring = false;
                btn.style.background = "var(--success)";
                btn.textContent = "Pantau";
                clearInterval(monitorInterval);
                logAdmin("Pemantauan dihentikan.");
            }
        }
    </script>
</body>

</html>
