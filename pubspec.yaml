name: presence
description: Cloud Computing Practicum - Flutter Client App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP Client
  dio: ^5.4.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # QR Scan
  mobile_scanner: ^5.1.0

  # Sensors
  sensors_plus: ^5.0.0

  # GPS
  geolocator: ^12.0.0

  # Google Maps
  google_maps_flutter: ^2.9.0

  # Device Info (untuk device_id)
  device_info_plus: ^10.1.0

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.11

flutter:
  uses-material-design: true
